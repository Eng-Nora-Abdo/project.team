<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
 <title>Sign Upp</title>

 <link rel="stylesheet" href="assets/css/sign_up.css">
</head>

<body>
    <!--start navbar -->
 <div class="navbar">
 <div class="logo">Ride <SPan>HUB</SPan></div>
 <div class="nav-links">
 <a href="index.html">Home</a>
 <a href="sign_up.html">Sign Up</a>
 <a href="login.html">Login</a>
 </div>
 </div> 


<!-- signup-container -->
<section class="signup-container">
  <video autoplay muted loop class="bg-video">
    <source src="./assets/images/5703508-uhd_3840_2160_25fps.mp4" type="video/mp4">
  </video>

  <div class="content">
    <h1>Create Account</h1>
    <p>Join our ride-hailing platform</p>

    <!-- form -->
    <form>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" />
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Confirm your password" />
      </div>

      <button type="submit">Sign Up</button>
    </form>

    <!-- form-footer -->
    <div class="form-footer">
      By signing up, you agree to our terms & policies
    </div>
  </div> 
</section> 


<!-- javaScript -->
<script src="./assets/js/script.js"></script>

</body>
</html>
