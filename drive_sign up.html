    <!-- driver-form-container -->
    <div class="driver-form-container">
      <h2>Driver Registration</h2>
      <form>
        <!-- form-group -->
        <!-- driverName -->
        <div class="form-group">
          <label for="driverName">Driver Name</label>
          <input
            type="text"
            id="driverName"
            name="driverName"
            placeholder="Enter your name"
            required
          />
        </div>
        <!-- vehicle -->
        <div class="form-group">
          <label for="vehicle">Vehicle Type</label>
          <select id="vehicle" name="vehicle" required>
            <option value="">Select vehicle</option>
            <option value="sedan">car</option>
            <option value="suv">taxi</option>
            <option value="van">scotter</option>
            <option value="motorbike">Motorbike</option>
          </select>
        </div>
        <!-- location -->
        <div class="form-group">
          <label for="location">Current Location</label>
          <input
            type="text"
            id="location"
            name="location"
            placeholder="City or Address"
            required
          />
        </div>
        <!-- rideType -->
        <div class="form-group">
          <label for="rideType">Ride Type</label>
          <select id="rideType" name="rideType" required>
            <option value="">Select ride type</option>
            <option value="standard">Standard</option>
            <option value="premium">Premium</option>
            <option value="pool">Pool</option>
          </select>
        </div>
        <!-- availability -->
        <div class="form-group">
          <label for="availability">Availability</label>
          <select id="availability" name="availability" required>
            <option value="">Select availability</option>
            <option value="available">Available</option>
            <option value="not_available">Not Available</option>
          </select>
        </div>

        <!-- Upload CV -->
        <div class="form-group">
          <label for="cv">Upload Your CV</label>
          <input
            type="file"
            id="cv"
            name="cv"
            accept=".pdf,.doc,.docx"
            required
          />
        </div>

        <!-- Additional Info -->
        <div class="form-group">
          <label for="additionalInfo">Additional Information</label>
          <textarea
            id="additionalInfo"
            name="additionalInfo"
            placeholder="Provide info about your experience, skills, etc."
            required
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>
